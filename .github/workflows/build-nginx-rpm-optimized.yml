name: Build Centmin Mod Nginx RPM (Optimized)
run-name: "Optimized RPM: ${{ inputs.el_versions }} crypto=${{ inputs.crypto }} zlib=${{ inputs.zlib }} lto=${{ inputs.lto }} march=${{ inputs.march }} linker=${{ inputs.linker }}"

on:
  workflow_dispatch:
    inputs:
      el_versions:
        description: 'EL versions to build'
        required: true
        default: 'el9'
        type: choice
        options:
          - el10
          - el9
          - el8
          - el9-el10
          - el8-el9-el10
      crypto:
        description: 'Crypto library'
        required: true
        default: 'system'
        type: choice
        options:
          - system
          - awslc
          - openssl
      zlib:
        description: 'Compression library'
        required: true
        default: 'system'
        type: choice
        options:
          - system
          - cloudflare
      lto:
        description: 'Link-Time Optimization'
        required: true
        default: 'n'
        type: choice
        options:
          - 'n'
          - 'y'
      march:
        description: 'Microarchitecture target'
        required: true
        default: 'generic'
        type: choice
        options:
          - generic
          - x86-64-v2
          - x86-64-v3
          - x86-64-v4
      linker:
        description: 'Linker selection (LTO+mold is experimental)'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - mold

jobs:
  build:
    name: Build RPM (EL${{ matrix.el_version }}, crypto=${{ inputs.crypto || 'system' }}, zlib=${{ inputs.zlib || 'system' }}, lto=${{ inputs.lto || 'n' }}, march=${{ inputs.march || 'generic' }}, linker=${{ inputs.linker || 'default' }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        el_version: ${{ fromJSON(
          inputs.el_versions == 'el8' && '["8"]' ||
          inputs.el_versions == 'el9' && '["9"]' ||
          inputs.el_versions == 'el10' && '["10"]' ||
          inputs.el_versions == 'el9-el10' && '["9","10"]' ||
          inputs.el_versions == 'el8-el9-el10' && '["8","9","10"]' ||
          '["9"]'
          ) }}
    steps:
      - name: Record workflow start time
        run: echo "WORKFLOW_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile.rpmbuild-el${{ matrix.el_version }} -t rpmbuild:el${{ matrix.el_version }} .

      - name: Build RPMs
        run: mkdir -p output && chmod 777 output && docker run --rm -e CRYPTO=${{ inputs.crypto || 'system' }} -e ZLIB=${{ inputs.zlib || 'system' }} -e LTO=${{ inputs.lto || 'n' }} -e MARCH=${{ inputs.march || 'generic' }} -e LINKER=${{ inputs.linker || 'default' }} -v ${{ github.workspace }}/output:/output rpmbuild:el${{ matrix.el_version }}

      - name: Verify module spec generation
        run: |
          docker run --rm rpmbuild:el${{ matrix.el_version }} bash -c '
            cd /home/builder/rpmbuild/SPECS
            echo "=== Verifying module spec generation (CRYPTO=${{ inputs.crypto || 'system' }}, ZLIB=${{ inputs.zlib || 'system' }}, LTO=${{ inputs.lto || 'n' }}, MARCH=${{ inputs.march || 'generic' }}, LINKER=${{ inputs.linker || 'default' }}) ==="
            PASS=0
            FAIL=0
            for mod in accesskey brotli cache-purge dav-ext echo encrypted-session fancyindex geoip2 headers-more http-concat http-rdns http-redis length-hiding lua memc ndk njs redis2 set-misc srcache ssl-fingerprint sticky subs-filter testcookie upstream-check vts xslt zstd; do
              if make CONTRIB=/home/builder/contrib DOCS=/home/builder/docs CRYPTO=${{ inputs.crypto || 'system' }} ZLIB=${{ inputs.zlib || 'system' }} LTO=${{ inputs.lto || 'n' }} MARCH=${{ inputs.march || 'generic' }} LINKER=${{ inputs.linker || 'default' }} nginx-module-${mod}.spec 2>&1; then
                echo "PASS: nginx-module-${mod}.spec generated"
                PASS=$((PASS+1))
              else
                echo "FAIL: nginx-module-${mod}.spec failed"
                FAIL=$((FAIL+1))
              fi
            done
            echo "=== Module spec summary: $PASS passed, $FAIL failed ==="
          '

      - name: List built RPMs
        run: ls -lh output/

      - name: Verify RPM packages
        run: |
          echo "=== RPM package verification ==="
          for rpm in output/*.rpm; do
            [ -f "$rpm" ] || continue
            echo ""
            echo "--- $(basename $rpm) ---"
            echo ""
            echo ":: rpm -qip (package info) ::"
            rpm -qip "$rpm"
            echo ""
            echo ":: rpm -qlp (file list) ::"
            rpm -qlp "$rpm"
            echo ""
            echo ":: rpm -qp --provides ::"
            rpm -qp --provides "$rpm"
            echo ""
            echo ":: rpm -qp --requires ::"
            rpm -qp --requires "$rpm"
            echo ""
            echo ":: rpm -qp --conflicts ::"
            rpm -qp --conflicts "$rpm" || true
            echo ""
            echo ":: rpm -Kp (signature/digest check) ::"
            rpm -Kp "$rpm" || true
            echo "==============================="
          done

      - name: Verify RPM paths
        run: |
          echo "=== Checking Centmin Mod paths in main RPM ==="
          # Handle crypto-variant package names (centminmod-nginx-awslc-*.rpm etc.)
          main_rpm=$(ls output/centminmod-nginx*-[0-9]*.x86_64.rpm 2>/dev/null | grep -v debuginfo | head -1)
          if [ -n "$main_rpm" ]; then
            echo "Checking: $main_rpm"
            rpm -qlp "$main_rpm" | grep -c '/usr/local/nginx' && echo "PASS: /usr/local/nginx paths found" || echo "FAIL: no /usr/local/nginx paths"
            rpm -qlp "$main_rpm" | grep -c '/usr/local/sbin/nginx' && echo "PASS: /usr/local/sbin/nginx binary found" || echo "FAIL: no /usr/local/sbin/nginx"
            rpm -qip "$main_rpm" | grep -q 'centminmod-nginx' && echo "PASS: package name is centminmod-nginx" || echo "FAIL: wrong package name"
            rpm -qip "$main_rpm" | grep -q 'Centmin Mod' && echo "PASS: vendor is Centmin Mod" || echo "FAIL: wrong vendor"
            rpm -qp --provides "$main_rpm" | grep -q 'nginx =' && echo "PASS: provides nginx compatibility" || echo "FAIL: missing nginx provides"
            rpm -qp --conflicts "$main_rpm" | grep -q 'nginx' && echo "PASS: conflicts with stock nginx" || echo "FAIL: missing nginx conflicts"
          else
            echo "FAIL: main RPM not found"
            exit 1
          fi

      - name: Verify nginx -V output
        env:
          INPUT_LTO: ${{ inputs.lto || 'n' }}
          INPUT_MARCH: ${{ inputs.march || 'generic' }}
          INPUT_LINKER: ${{ inputs.linker || 'default' }}
        run: |
          docker run --rm --user root -v ${{ github.workspace }}/output:/output rpmbuild:el${{ matrix.el_version }} bash -c '
            echo "=== Installing RPM and running nginx -V ==="
            main_rpm=$(ls /output/centminmod-nginx*-[0-9]*.x86_64.rpm 2>/dev/null | grep -v debuginfo | head -1)
            if [ -z "$main_rpm" ]; then
              echo "FAIL: main RPM not found"
              exit 1
            fi
            rpm -ivh --nodeps "$main_rpm" 2>&1
            echo ""
            echo ":: nginx -V ::"
            NGINX_V=$(/usr/local/sbin/nginx -V 2>&1)
            echo "$NGINX_V"
            echo ""
            echo ":: nginx -t (config syntax check) ::"
            /usr/local/sbin/nginx -t 2>&1 || true
            echo ""
            echo "=== Compiler verification ==="
            PASS=0
            FAIL=0
            echo ":: Checking GCC version in built binary ::"
            if echo "$NGINX_V" | grep -qiE "gcc [0-9]+\.[0-9]+"; then
              GCC_USED=$(echo "$NGINX_V" | grep -oiE "gcc [0-9]+\.[0-9]+\.[0-9]+" | head -1)
              echo "Built with: $GCC_USED"
              EL_VERSION=$(rpm -E %{rhel})
              case "$EL_VERSION" in
                8) EXPECTED_GCC="14" ;;
                9) EXPECTED_GCC="15" ;;
                10) EXPECTED_GCC="14" ;;
              esac
              if echo "$GCC_USED" | grep -q "gcc ${EXPECTED_GCC}\."; then
                echo "PASS: GCC major version matches expected ($EXPECTED_GCC) for EL${EL_VERSION}"
                PASS=$((PASS+1))
              else
                echo "WARN: GCC version mismatch - expected GCC ${EXPECTED_GCC}, got $GCC_USED"
                FAIL=$((FAIL+1))
              fi
            fi
            echo ""
            echo ":: Checking compiler flags in nginx -V ::"
            for flag in "-O3" "-fstack-protector-strong" "-fstack-clash-protection" "-Wimplicit-fallthrough=0" "--param=ssp-buffer-size=4"; do
              if echo "$NGINX_V" | grep -q -- "$flag"; then
                echo "PASS: $flag found"
                PASS=$((PASS+1))
              else
                echo "FAIL: $flag NOT found"
                FAIL=$((FAIL+1))
              fi
            done
            echo ""
            echo ":: Checking FORTIFY_SOURCE level ::"
            EL_VERSION=$(rpm -E %{rhel})
            if [ "$EL_VERSION" = "10" ]; then
              EXPECTED_FORTIFY="FORTIFY_SOURCE=3"
            else
              EXPECTED_FORTIFY="FORTIFY_SOURCE=2"
            fi
            if echo "$NGINX_V" | grep -q "$EXPECTED_FORTIFY"; then
              echo "PASS: $EXPECTED_FORTIFY found (correct for EL${EL_VERSION})"
              PASS=$((PASS+1))
            else
              echo "FAIL: $EXPECTED_FORTIFY NOT found"
              FAIL=$((FAIL+1))
            fi
            echo ""
            echo ":: Checking linker flags ::"
            for flag in "--as-needed" "-Bsymbolic-functions"; do
              if echo "$NGINX_V" | grep -q -- "$flag"; then
                echo "PASS: $flag found"
                PASS=$((PASS+1))
              else
                echo "FAIL: $flag NOT found"
                FAIL=$((FAIL+1))
              fi
            done
            echo ""
            echo "=== Phase 5A optimization verification ==="
            echo ":: Checking LTO flags (LTO='"'"'${{ inputs.lto || 'n' }}'"'"') ::"
            if [ "${{ inputs.lto || 'n' }}" = "y" ]; then
              if echo "$NGINX_V" | grep -q -- "-flto=auto"; then
                echo "PASS: -flto=auto found (LTO enabled)"
                PASS=$((PASS+1))
              else
                echo "FAIL: -flto=auto NOT found but LTO=y was requested"
                FAIL=$((FAIL+1))
              fi
            else
              if echo "$NGINX_V" | grep -q -- "-flto"; then
                echo "FAIL: -flto found but LTO=n (should not be present)"
                FAIL=$((FAIL+1))
              else
                echo "PASS: No -flto flag (LTO disabled as expected)"
                PASS=$((PASS+1))
              fi
            fi
            echo ""
            echo ":: Checking MARCH flags (MARCH='"'"'${{ inputs.march || 'generic' }}'"'"') ::"
            if [ "${{ inputs.march || 'generic' }}" != "generic" ]; then
              if echo "$NGINX_V" | grep -q -- "-march=${{ inputs.march || 'generic' }}"; then
                echo "PASS: -march=${{ inputs.march || 'generic' }} found"
                PASS=$((PASS+1))
              else
                echo "FAIL: -march=${{ inputs.march || 'generic' }} NOT found"
                FAIL=$((FAIL+1))
              fi
            else
              if echo "$NGINX_V" | grep -q -- "-march="; then
                echo "FAIL: -march= found but MARCH=generic (should not be present)"
                FAIL=$((FAIL+1))
              else
                echo "PASS: No -march= flag (generic as expected)"
                PASS=$((PASS+1))
              fi
            fi
            echo ""
            echo ":: Checking LINKER flags (LINKER='"'"'${{ inputs.linker || 'default' }}'"'"') ::"
            if [ "${{ inputs.linker || 'default' }}" = "mold" ]; then
              if echo "$NGINX_V" | grep -q -- "-fuse-ld=mold"; then
                echo "PASS: -fuse-ld=mold found (mold linker enabled)"
                PASS=$((PASS+1))
              else
                echo "FAIL: -fuse-ld=mold NOT found but LINKER=mold was requested"
                FAIL=$((FAIL+1))
              fi
            else
              if echo "$NGINX_V" | grep -q -- "-fuse-ld=mold"; then
                echo "FAIL: -fuse-ld=mold found but LINKER=default (should not be present)"
                FAIL=$((FAIL+1))
              else
                echo "PASS: No -fuse-ld=mold flag (default linker as expected)"
                PASS=$((PASS+1))
              fi
            fi
            echo ""
            echo "=== Verification summary: $PASS passed, $FAIL failed ==="
            if [ "$FAIL" -gt 0 ]; then
              echo "WARNING: Some verification checks failed"
            fi
          '

      - name: Benchmark nginx
        env:
          BENCH_LABEL: "EL${{ matrix.el_version }} crypto=${{ inputs.crypto || 'system' }} zlib=${{ inputs.zlib || 'system' }} lto=${{ inputs.lto || 'n' }} march=${{ inputs.march || 'generic' }} linker=${{ inputs.linker || 'default' }}"
        run: |
          docker run --rm --user root \
            -e BENCH_LABEL="${BENCH_LABEL}" \
            -v ${{ github.workspace }}/output:/output \
            rpmbuild:el${{ matrix.el_version }} bash -c '
            echo "=== Installing nginx for benchmark ==="
            main_rpm=$(ls /output/centminmod-nginx*-[0-9]*.x86_64.rpm 2>/dev/null | grep -v debuginfo | head -1)
            rpm -ivh --nodeps "$main_rpm" 2>&1 | tail -3
            dnf -y install httpd-tools nghttp2 2>&1 | tail -5

            # Generate self-signed TLS cert for HTTP/2 benchmark
            openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
              -keyout /tmp/bench.key -out /tmp/bench.crt \
              -subj "/CN=localhost" 2>/dev/null
            mkdir -p /usr/local/nginx/conf/conf.d
            printf "server {\n    listen 8443 ssl;\n    http2 on;\n    server_name localhost;\n    ssl_certificate /tmp/bench.crt;\n    ssl_certificate_key /tmp/bench.key;\n    ssl_protocols TLSv1.2 TLSv1.3;\n    ssl_session_cache shared:SSL:1m;\n    location / {\n        root /usr/local/nginx/html;\n    }\n}\n" > /usr/local/nginx/conf/conf.d/bench-ssl.conf

            /usr/local/sbin/nginx
            sleep 1

            echo ""
            echo "=========================================="
            echo "=== HTTP/1.1 BENCHMARK (ab)            ==="
            echo "=== ${BENCH_LABEL} ==="
            echo "=========================================="
            ab -n 10000 -c 50 http://127.0.0.1:80/ > /dev/null 2>&1
            for run in 1 2 3; do
              echo ""
              echo "--- HTTP/1.1 run ${run}/3 ---"
              ab -n 100000 -c 100 http://127.0.0.1:80/ 2>&1 | grep -E "Requests per second|Time per request|Transfer rate|Complete requests|Failed requests"
            done

            echo ""
            echo "=========================================="
            echo "=== HTTP/2+TLS BENCHMARK (h2load)      ==="
            echo "=== ${BENCH_LABEL} ==="
            echo "=========================================="
            h2load -n 10000 -c 50 -m 10 -t 4 https://127.0.0.1:8443/ > /dev/null 2>&1
            for run in 1 2 3; do
              echo ""
              echo "--- HTTP/2+TLS run ${run}/3 ---"
              h2load -n 100000 -c 100 -m 10 -t 4 https://127.0.0.1:8443/ 2>&1 | grep -E "finished in|requests:|req/s|time for request|time for connect|status codes"
            done

            /usr/local/sbin/nginx -s quit 2>/dev/null || true
            echo ""
            echo "=== Benchmark complete ==="
          '

      - name: Workflow timing summary
        if: always()
        run: |
          WORKFLOW_END=$(date +%s)
          ELAPSED=$((WORKFLOW_END - WORKFLOW_START))
          MINS=$((ELAPSED / 60))
          SECS=$((ELAPSED % 60))
          echo "=========================================="
          echo "=== WORKFLOW TIMING SUMMARY             ==="
          echo "=========================================="
          echo "  EL version:  ${{ matrix.el_version }}"
          echo "  Crypto:      ${{ inputs.crypto || 'system' }}"
          echo "  Zlib:        ${{ inputs.zlib || 'system' }}"
          echo "  LTO:         ${{ inputs.lto || 'n' }}"
          echo "  March:       ${{ inputs.march || 'generic' }}"
          echo "  Linker:      ${{ inputs.linker || 'default' }}"
          echo "  Total time:  ${MINS}m ${SECS}s (${ELAPSED}s)"
          echo "=========================================="

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nginx-rpms-el${{ matrix.el_version }}-optimized
          path: output/*.rpm
