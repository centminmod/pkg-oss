name: Publish RPMs to R2 Repository
run-name: "Publish: ${{ inputs.variant }}/el${{ inputs.el_version }} (run ${{ inputs.run_id }})"

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Repository variant (maps to R2 directory)'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - awslc
          - openssl
          - optimized
          - optimized-v4
          - awslc-optimized
          - awslc-optimized-v4
          - bolt
      el_version:
        description: 'EL version'
        required: true
        default: '9'
        type: choice
        options:
          - '9'
          - '8'
          - '10'
      run_id:
        description: 'Source build workflow run ID (for artifact download)'
        required: true
        type: string
  workflow_call:
    inputs:
      variant:
        description: 'Repository variant'
        required: true
        type: string
      el_version:
        description: 'EL version'
        required: true
        type: string
      run_id:
        description: 'Source build workflow run ID'
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: publish-${{ inputs.variant }}-el${{ inputs.el_version }}
  cancel-in-progress: false

env:
  R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  R2_BUCKET: rpm-nginx
  CUSTOM_DOMAIN: rpm-nginx.centminmod.com
  AWS_DEFAULT_REGION: auto
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  publish:
    name: Publish ${{ inputs.variant }}/el${{ inputs.el_version }}
    runs-on: ubuntu-24.04
    steps:
      - name: Record workflow start time
        run: echo "WORKFLOW_START=$(date +%s)" >> $GITHUB_ENV

      - name: Validate required secrets
        run: |
          echo "=== Pre-flight secrets validation ==="
          MISSING=0
          for secret_name in R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY CF_ZONE_ID CF_API_TOKEN; do
            case "$secret_name" in
              R2_ACCOUNT_ID)       val="${{ secrets.R2_ACCOUNT_ID }}" ;;
              R2_ACCESS_KEY_ID)    val="${{ secrets.R2_ACCESS_KEY_ID }}" ;;
              R2_SECRET_ACCESS_KEY) val="${{ secrets.R2_SECRET_ACCESS_KEY }}" ;;
              CF_ZONE_ID)          val="${{ secrets.CF_ZONE_ID }}" ;;
              CF_API_TOKEN)        val="${{ secrets.CF_API_TOKEN }}" ;;
            esac
            if [ -z "$val" ]; then
              echo "FAIL: Secret $secret_name is not configured"
              MISSING=$((MISSING+1))
            else
              echo "PASS: $secret_name is set (${#val} chars)"
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "ERROR: $MISSING required secret(s) missing — configure them in GitHub repo settings"
            exit 1
          fi
          echo "PASS: All required secrets configured"

      - name: Runner environment
        run: |
          echo "=== CPU ==="
          lscpu | head -5
          echo ""
          echo "=== Memory ==="
          free -mlt
          echo ""
          echo "=== Disk ==="
          df -hT
          echo ""
          echo "=== Tools ==="
          echo "AWS CLI: $(aws --version 2>&1)"
          echo "Docker:  $(docker --version 2>&1)"
          echo "gh CLI:  $(gh --version 2>&1 | head -1)"

      - name: Derive artifact name and R2 path
        run: |
          VARIANT="${{ inputs.variant }}"
          EL_VERSION="${{ inputs.el_version }}"

          echo "=== Input mapping ==="
          echo "  variant:    $VARIANT"
          echo "  el_version: $EL_VERSION"
          echo "  run_id:     ${{ inputs.run_id }}"

          # Validate bolt is EL9-only
          if [ "$VARIANT" = "bolt" ] && [ "$EL_VERSION" != "9" ]; then
            echo "ERROR: BOLT variant is only available for EL9 (got EL${EL_VERSION})"
            exit 1
          fi

          # Map variant to artifact name suffix and R2 path
          case "$VARIANT" in
            stable|awslc|openssl)
              ARTIFACT_NAME="nginx-rpms-el${EL_VERSION}"
              ;;
            optimized)
              ARTIFACT_NAME="nginx-rpms-el${EL_VERSION}-optimized"
              ;;
            optimized-v4)
              ARTIFACT_NAME="nginx-rpms-el${EL_VERSION}-optimized-v4"
              ;;
            awslc-optimized)
              ARTIFACT_NAME="nginx-rpms-el${EL_VERSION}-awslc-optimized"
              ;;
            awslc-optimized-v4)
              ARTIFACT_NAME="nginx-rpms-el${EL_VERSION}-awslc-optimized-v4"
              ;;
            bolt)
              ARTIFACT_NAME="nginx-rpms-el9-bolt"
              ;;
            *)
              echo "ERROR: Unknown variant: $VARIANT"
              exit 1
              ;;
          esac

          REPO_PATH="${VARIANT}/el/${EL_VERSION}/x86_64"

          echo ""
          echo "=== Derived values ==="
          echo "  ARTIFACT_NAME: $ARTIFACT_NAME"
          echo "  REPO_PATH:     $REPO_PATH"
          echo "  R2 dest:       s3://${R2_BUCKET}/${REPO_PATH}/"
          echo "  Public URL:    https://${CUSTOM_DOMAIN}/${REPO_PATH}/"

          echo "VARIANT=${VARIANT}" >> $GITHUB_ENV
          echo "EL_VERSION=${EL_VERSION}" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV
          echo "REPO_PATH=${REPO_PATH}" >> $GITHUB_ENV

      - name: Download RPM artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Downloading artifact: ${ARTIFACT_NAME} from run ${{ inputs.run_id }} ==="
          gh run download "${{ inputs.run_id }}" \
            --repo "${{ github.repository }}" \
            --name "${ARTIFACT_NAME}" \
            --dir ./downloaded-rpms

          echo ""
          echo "=== Downloaded files ==="
          ls -lhS ./downloaded-rpms/
          echo ""
          echo "=== Total size ==="
          du -sh ./downloaded-rpms/

      - name: Verify complete package set
        run: |
          echo "=== Package set verification ==="

          # Count base RPMs (exclude debuginfo, modules, src.rpm)
          BASE_RPMS=$(ls -1 downloaded-rpms/centminmod-nginx*.x86_64.rpm 2>/dev/null \
            | grep -v debuginfo | grep -v debugsource | grep -v "nginx-module" || true)
          if [ -n "$BASE_RPMS" ]; then
            BASE_COUNT=$(echo "$BASE_RPMS" | wc -l)
          else
            BASE_COUNT=0
          fi

          # Count module RPMs (exclude debuginfo)
          MODULE_RPMS=$(ls -1 downloaded-rpms/nginx-module-*.x86_64.rpm 2>/dev/null \
            | grep -v debuginfo | grep -v debugsource || true)
          if [ -n "$MODULE_RPMS" ]; then
            MODULE_COUNT=$(echo "$MODULE_RPMS" | wc -l)
          else
            MODULE_COUNT=0
          fi

          echo "Base RPMs:   $BASE_COUNT"
          echo "Module RPMs: $MODULE_COUNT"
          echo ""

          # Verify crypto variant matches base RPM filename
          if [ -n "$BASE_RPMS" ]; then
            BASE_RPM_NAME=$(basename "$(echo "$BASE_RPMS" | head -1)")
            echo "Base RPM: $BASE_RPM_NAME"

            case "${VARIANT}" in
              stable|optimized|bolt)
                # Should NOT contain crypto suffix (awslc, openssl) between nginx and version
                if echo "$BASE_RPM_NAME" | grep -qE "nginx-(awslc|openssl)-"; then
                  echo "ERROR: Expected stable base RPM but found crypto variant: $BASE_RPM_NAME"
                  exit 1
                fi
                echo "PASS: Base RPM matches stable variant"
                ;;
              awslc|awslc-optimized|awslc-optimized-v4)
                if ! echo "$BASE_RPM_NAME" | grep -q "nginx-awslc-"; then
                  echo "ERROR: Expected awslc base RPM but got: $BASE_RPM_NAME"
                  exit 1
                fi
                echo "PASS: Base RPM matches awslc variant"
                ;;
              openssl)
                if ! echo "$BASE_RPM_NAME" | grep -q "nginx-openssl-"; then
                  echo "ERROR: Expected openssl base RPM but got: $BASE_RPM_NAME"
                  exit 1
                fi
                echo "PASS: Base RPM matches openssl variant"
                ;;
            esac
          fi

          echo ""
          echo "--- RPM inventory ---"
          for rpm in downloaded-rpms/*.x86_64.rpm; do
            [ -f "$rpm" ] || continue
            echo "  $(basename "$rpm") ($(du -h "$rpm" | cut -f1))"
          done

          echo ""
          echo "--- Base RPM info ---"
          if [ -n "$BASE_RPMS" ]; then
            rpm -qip "$(echo "$BASE_RPMS" | head -1)" 2>/dev/null | grep -E "^(Name|Version|Release|Vendor|Architecture)" || true
          fi

          echo ""
          # awslc variants: njs module rebuild fails on EL9/EL10 with awslc crypto
          # (njs RPM from base build gets cleaned up by failed module rebuild)
          case "${VARIANT}" in
            awslc|awslc-optimized|awslc-optimized-v4) EXPECTED_MODULES=25 ;;
            *) EXPECTED_MODULES=26 ;;
          esac
          if [ "$BASE_COUNT" -lt 1 ]; then
            echo "FAIL: No base RPM found"
            exit 1
          fi
          if [ "$MODULE_COUNT" -lt "$EXPECTED_MODULES" ]; then
            echo "FAIL: Only $MODULE_COUNT module RPMs found (expected $EXPECTED_MODULES)"
            echo ""
            echo "Expected modules: accesskey brotli cache-purge dav-ext echo encrypted-session"
            echo "  fancyindex geoip2 headers-more http-concat http-rdns http-redis"
            echo "  image-filter length-hiding lua memc ndk njs redis2 set-misc srcache"
            echo "  subs-filter testcookie vts xslt zstd"
            exit 1
          fi
          echo "PASS: Complete package set ($BASE_COUNT base + $MODULE_COUNT modules)"

      - name: Stage RPMs into repo directory
        run: |
          echo "=== Staging RPMs ==="
          mkdir -p "repo/${REPO_PATH}"

          # Copy x86_64 RPMs, exclude debuginfo and source RPMs
          cp downloaded-rpms/*.x86_64.rpm "repo/${REPO_PATH}/"
          rm -f "repo/${REPO_PATH}/"*-debuginfo-*.rpm
          rm -f "repo/${REPO_PATH}/"*-debugsource-*.rpm

          echo "=== Staged RPMs ==="
          ls -lhS "repo/${REPO_PATH}/"
          STAGED_COUNT=$(ls "repo/${REPO_PATH}/"*.rpm 2>/dev/null | wc -l)
          echo ""
          echo "=== Staged count: $STAGED_COUNT RPMs ==="

      - name: Generate repository metadata (createrepo_c)
        run: |
          docker run --rm \
            -v "$(pwd)/repo/${REPO_PATH}:/repo" \
            almalinux:9 bash -c '
              echo "=== Installing createrepo_c ==="
              dnf -y install createrepo_c 2>&1 | tail -5
              echo ""
              echo "=== createrepo_c version ==="
              createrepo_c --version
              echo ""
              echo "=== Generating repository metadata ==="
              createrepo_c \
                --compress-type gz \
                --checksum sha256 \
                --unique-md-filenames \
                --workers $(nproc) \
                --update \
                --verbose \
                /repo
              echo ""
              echo "=== Generated repodata ==="
              ls -lh /repo/repodata/
              echo ""
              echo "=== repomd.xml content ==="
              cat /repo/repodata/repomd.xml
            '

      - name: Verify repodata integrity
        run: |
          echo "=== Verify repodata files ==="
          PASS=0; FAIL=0

          if [ -f "repo/${REPO_PATH}/repodata/repomd.xml" ]; then
            SIZE=$(wc -c < "repo/${REPO_PATH}/repodata/repomd.xml")
            echo "PASS: repomd.xml exists ($SIZE bytes)"
            PASS=$((PASS+1))
          else
            echo "FAIL: repomd.xml MISSING"
            FAIL=$((FAIL+1))
          fi

          # Check hash-named metadata blobs
          BLOB_COUNT=$(ls "repo/${REPO_PATH}/repodata/"*-*.xml.gz 2>/dev/null | wc -l)
          echo "Hash-named metadata blobs: $BLOB_COUNT"
          if [ "$BLOB_COUNT" -ge 3 ]; then
            echo "PASS: Expected metadata blobs present (primary, filelists, other)"
            PASS=$((PASS+1))
          else
            echo "FAIL: Too few metadata blobs ($BLOB_COUNT, expected >= 3)"
            FAIL=$((FAIL+1))
          fi

          echo ""
          echo "=== Repodata verification: $PASS passed, $FAIL failed ==="
          if [ "$FAIL" -gt 0 ]; then
            echo "ERROR: Repodata verification failed — aborting upload"
            exit 1
          fi

      - name: GPG signing (Phase 8B — placeholder)
        run: |
          echo "GPG signing is Phase 8B — skipping for now"
          echo "Future: gpg --batch --yes --detach-sign --armor repo/${REPO_PATH}/repodata/repomd.xml"

      - name: 'Upload Phase 1: RPM files'
        run: |
          echo "=== Upload Phase 1: RPM files ==="
          echo "Destination: s3://${R2_BUCKET}/${REPO_PATH}/"
          aws s3 sync "repo/${REPO_PATH}/" "s3://${R2_BUCKET}/${REPO_PATH}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --exclude "repodata/*" \
            --content-type "application/x-rpm" \
            --cache-control "public, max-age=3600" \
            --no-progress
          echo "DONE: RPM files uploaded"

      - name: 'Upload Phase 2: Metadata blobs'
        run: |
          echo "=== Upload Phase 2: Metadata blobs ==="
          aws s3 sync "repo/${REPO_PATH}/repodata/" "s3://${R2_BUCKET}/${REPO_PATH}/repodata/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --exclude "repomd.xml" \
            --exclude "repomd.xml.asc" \
            --content-type "application/gzip" \
            --cache-control "public, max-age=120" \
            --no-progress
          echo "DONE: Metadata blobs uploaded"

      - name: 'Upload Phase 3: repomd.xml entry point'
        run: |
          echo "=== Upload Phase 3: Entry point files ==="

          # Upload repomd.xml.asc first (if exists — Phase 8B)
          if [ -f "repo/${REPO_PATH}/repodata/repomd.xml.asc" ]; then
            echo "Uploading repomd.xml.asc..."
            aws s3 cp "repo/${REPO_PATH}/repodata/repomd.xml.asc" \
              "s3://${R2_BUCKET}/${REPO_PATH}/repodata/repomd.xml.asc" \
              --endpoint-url "${R2_ENDPOINT}" \
              --content-type "application/pgp-signature" \
              --cache-control "public, max-age=30"
          else
            echo "SKIP: repomd.xml.asc not present (GPG signing is Phase 8B)"
          fi

          # Upload repomd.xml LAST — all referenced files are already in place
          echo "Uploading repomd.xml (entry point — LAST)..."
          aws s3 cp "repo/${REPO_PATH}/repodata/repomd.xml" \
            "s3://${R2_BUCKET}/${REPO_PATH}/repodata/repomd.xml" \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/xml" \
            --cache-control "public, max-age=30"
          echo "DONE: Entry point updated"

      - name: 'Upload Phase 4: CDN cache purge'
        run: |
          echo "=== Upload Phase 4: CDN cache purge ==="
          REPOMD_URL="https://${CUSTOM_DOMAIN}/${REPO_PATH}/repodata/repomd.xml"
          REPOMD_ASC_URL="https://${CUSTOM_DOMAIN}/${REPO_PATH}/repodata/repomd.xml.asc"
          echo "Purging:"
          echo "  $REPOMD_URL"
          echo "  $REPOMD_ASC_URL"

          PURGE_RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"files\":[\"${REPOMD_URL}\",\"${REPOMD_ASC_URL}\"]}")

          HTTP_CODE=$(echo "$PURGE_RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$PURGE_RESPONSE" | grep -v "HTTP_CODE:")
          echo ""
          echo "Purge HTTP code: $HTTP_CODE"
          echo "Purge response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: CDN cache purge returned HTTP $HTTP_CODE (non-fatal)"
          else
            echo "DONE: CDN cache purged"
          fi

      - name: Generate and upload index.html
        run: |
          UPDATED="$(date -u '+%B %d, %Y')"
          cat > /tmp/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Centmin Mod Nginx RPM Repository</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#333;line-height:1.6;background:#f8f9fa}
          .hero{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:3rem 1rem;text-align:center}
          .hero h1{font-size:2rem;margin-bottom:.5rem}
          .hero p{color:#b0b8c8;font-size:1.1rem}
          .wrap{max-width:800px;margin:0 auto;padding:2rem 1rem}
          h2{color:#1a1a2e;margin:2rem 0 1rem;font-size:1.3rem;border-bottom:2px solid #e0e0e0;padding-bottom:.3rem}
          p,ul{margin-bottom:1rem}
          ul{margin-left:1.5rem}
          pre{background:#1a1a2e;color:#e0e0e0;padding:1.2rem;border-radius:8px;overflow-x:auto;font-size:.88rem;margin-bottom:1.5rem;line-height:1.5}
          .cmt{color:#6a9955}
          table{width:100%;border-collapse:collapse;margin-bottom:1.5rem}
          th{background:#1a1a2e;color:#fff;padding:.6rem;text-align:left;font-size:.88rem}
          td{padding:.5rem .6rem;border-bottom:1px solid #e0e0e0;font-size:.88rem}
          tr:hover{background:#f0f0f0}
          code{background:#e8e8e8;padding:.1rem .35rem;border-radius:3px;font-size:.85rem}
          .mtable{width:100%;border-collapse:collapse;margin-bottom:1.5rem;font-size:.88rem}
          .mtable td{padding:.4rem .6rem;border-bottom:1px solid #eee}
          .mtable td:first-child{font-weight:500;white-space:nowrap;width:260px}
          .mtable tr:hover{background:#f8f9fa}
          .foot{text-align:center;padding:2rem 1rem;color:#888;font-size:.85rem;border-top:1px solid #e0e0e0;margin-top:2rem}
          .foot a{color:#555}
          a{color:#2563eb;text-decoration:none}
          a:hover{text-decoration:underline}
          </style>
          </head>
          <body>
          <div class="hero">
          <h1>Centmin Mod Nginx RPM Repository</h1>
          <p>High-performance Nginx packages for AlmaLinux &amp; Rocky Linux</p>
          </div>
          <div class="wrap">

          <h2>Getting Started</h2>
          <p>Set up the repository on your server and install Nginx:</p>
          <pre><span class="cmt"># Step 1 &mdash; Add the repository</span>
          cat &gt; /etc/yum.repos.d/centminmod-nginx.repo &lt;&lt; 'EOF'
          [centminmod-nginx]
          name=Centmin Mod Nginx
          baseurl=https://rpm-nginx.centminmod.com/stable/el/\$releasever/\$basearch/
          enabled=1
          gpgcheck=0
          EOF

          <span class="cmt"># EL8 only: disable nginx module stream to avoid conflicts</span>
          dnf module disable -y nginx  <span class="cmt"># skip on EL9/EL10</span>

          <span class="cmt"># Step 2 &mdash; Install Nginx (+ all modules, optional)</span>
          dnf install -y centminmod-nginx nginx-module-*</pre>

          <p>Start and enable Nginx:</p>
          <pre>systemctl start nginx
          systemctl enable nginx</pre>

          <h2>What You Get</h2>
          <ul>
          <li>Production-ready Nginx at <code>/usr/local/nginx/</code></li>
          <li>26 optional modules you can add any time</li>
          <li>Optimized builds with modern GCC toolsets</li>
          <li>Ready-to-use config files for common setups</li>
          <li>Managed via systemd like any other service</li>
          </ul>

          <h2>Adding Modules</h2>
          <p>Install only the modules you need:</p>
          <pre><span class="cmt"># Example: add Brotli compression and Lua scripting</span>
          dnf install nginx-module-brotli nginx-module-lua

          <span class="cmt"># See everything available</span>
          dnf list available nginx-module-*</pre>

          <h2>Prerequisites</h2>
          <p>Most dependencies are resolved automatically by dnf. Some modules require system libraries that dnf will pull in when you install them:</p>
          <table>
          <tr><th>System Package</th><th>Required By</th><th>Notes</th></tr>
          <tr><td><code>procps-ng</code></td><td>centminmod-nginx (base)</td><td>Explicit RPM dependency</td></tr>
          <tr><td><code>brotli</code></td><td>nginx-module-brotli</td><td>Auto-resolved by dnf</td></tr>
          <tr><td><code>libmaxminddb</code></td><td>nginx-module-geoip2</td><td>Auto-resolved by dnf</td></tr>
          <tr><td><code>gd</code></td><td>nginx-module-image-filter</td><td>Auto-resolved by dnf</td></tr>
          <tr><td><code>libxslt</code></td><td>nginx-module-xslt, nginx-module-dav-ext</td><td>Auto-resolved by dnf</td></tr>
          <tr><td><code>libxml2</code></td><td>nginx-module-xslt, nginx-module-dav-ext</td><td>Auto-resolved by dnf</td></tr>
          <tr><td><code>libzstd</code></td><td>nginx-module-zstd</td><td>Auto-resolved by dnf</td></tr>
          </table>
          <p>On minimal installs, you can pre-install all prerequisites at once:</p>
          <pre>dnf install -y procps-ng brotli libmaxminddb gd libxslt libxml2 libzstd</pre>
          <p><strong>EL8 only:</strong> Run <code>dnf module disable -y nginx</code> before installing to avoid modular filtering conflicts.</p>
          <p><strong>Module dependencies:</strong> <code>nginx-module-lua</code>, <code>nginx-module-set-misc</code>, and <code>nginx-module-encrypted-session</code> require <code>nginx-module-ndk</code> &mdash; resolved automatically by dnf.</p>

          <h2>Available Modules</h2>
          <p>Install any module with <code>dnf install nginx-module-&lt;name&gt;</code>. Each module auto-configures itself via drop-in config.</p>
          <table class="mtable">
          <tr><td>nginx-module-accesskey</td><td>Access key-based authorization</td></tr>
          <tr><td>nginx-module-brotli</td><td>Brotli compression (static + dynamic)</td></tr>
          <tr><td>nginx-module-cache-purge</td><td>Purge cached content by URL</td></tr>
          <tr><td>nginx-module-dav-ext</td><td>WebDAV extended methods (PROPFIND, OPTIONS, etc.)</td></tr>
          <tr><td>nginx-module-echo</td><td>Shell-style output and testing utilities</td></tr>
          <tr><td>nginx-module-encrypted-session</td><td>Encrypt/decrypt session variables</td></tr>
          <tr><td>nginx-module-fancyindex</td><td>Themed directory listings</td></tr>
          <tr><td>nginx-module-geoip2</td><td>MaxMind GeoIP2 database lookups</td></tr>
          <tr><td>nginx-module-headers-more</td><td>Add, set, or clear HTTP headers</td></tr>
          <tr><td>nginx-module-http-concat</td><td>Concatenate files in a single response</td></tr>
          <tr><td>nginx-module-http-rdns</td><td>Reverse DNS lookups for client IPs</td></tr>
          <tr><td>nginx-module-http-redis</td><td>Redis caching for HTTP responses</td></tr>
          <tr><td>nginx-module-image-filter</td><td>On-the-fly image resizing and transforms</td></tr>
          <tr><td>nginx-module-length-hiding</td><td>Pad response length to prevent side-channel leaks</td></tr>
          <tr><td>nginx-module-lua</td><td>Lua scripting (OpenResty lua-nginx-module)</td></tr>
          <tr><td>nginx-module-memc</td><td>Extended memcached interface</td></tr>
          <tr><td>nginx-module-ndk</td><td>Nginx Development Kit (dependency for lua, set-misc)</td></tr>
          <tr><td>nginx-module-njs</td><td>NGINX JavaScript &mdash; scripting with njs</td></tr>
          <tr><td>nginx-module-redis2</td><td>Redis 2.0 protocol support</td></tr>
          <tr><td>nginx-module-set-misc</td><td>Extended variable manipulation (base64, hashes, etc.)</td></tr>
          <tr><td>nginx-module-srcache</td><td>Subrequest-based caching (memcached/redis backends)</td></tr>
          <tr><td>nginx-module-subs-filter</td><td>Regex-based response body substitution</td></tr>
          <tr><td>nginx-module-testcookie</td><td>Bot detection via cookie challenge</td></tr>
          <tr><td>nginx-module-vts</td><td>Virtual host traffic status &amp; monitoring</td></tr>
          <tr><td>nginx-module-xslt</td><td>XML/XSLT response transformation</td></tr>
          <tr><td>nginx-module-zstd</td><td>Zstandard compression (static + dynamic)</td></tr>
          </table>

          <h2>Build Variants</h2>
          <p>Different builds are available. Most users should use <strong>stable</strong> (the default above).</p>
          <table>
          <tr><th>Variant</th><th>Best For</th></tr>
          <tr><td><strong>stable</strong></td><td>Most users &mdash; uses your system&rsquo;s OpenSSL</td></tr>
          <tr><td><strong>awslc</strong></td><td>AWS-LC crypto library (FIPS-capable)</td></tr>
          <tr><td><strong>openssl</strong></td><td>Custom OpenSSL built from source</td></tr>
          <tr><td><strong>optimized</strong></td><td>LTO + x86-64-v3 + mold linker (Haswell 2013+)</td></tr>
          <tr><td><strong>optimized-v4</strong></td><td>LTO + x86-64-v4 + mold linker (Skylake-X / Zen 4+, AVX-512)</td></tr>
          <tr><td><strong>awslc-optimized</strong></td><td>AWS-LC + LTO + x86-64-v3 + mold (Haswell 2013+)</td></tr>
          <tr><td><strong>awslc-optimized-v4</strong></td><td>AWS-LC + LTO + x86-64-v4 + mold (Skylake-X / Zen 4+, AVX-512)</td></tr>
          </table>
          <p>To switch variants, replace <code>stable</code> with the variant name in the baseurl.</p>

          <h2>Supported Systems</h2>
          <ul>
          <li>AlmaLinux / Rocky Linux 8 (x86_64)</li>
          <li>AlmaLinux / Rocky Linux 9 (x86_64)</li>
          <li>AlmaLinux / Rocky Linux 10 (x86_64)</li>
          </ul>

          </div>
          <div class="foot">
          <p><a href="https://centminmod.com">centminmod.com</a> &middot; <a href="https://github.com/centminmod/pkg-oss">GitHub</a> &middot; Updated ${UPDATED}</p>
          </div>
          </body>
          </html>
          HTMLEOF

          # Strip leading 10-space YAML indentation from heredoc lines
          sed -i 's/^          //' /tmp/index.html

          echo "=== Upload index.html ==="
          aws s3 cp /tmp/index.html "s3://${R2_BUCKET}/index.html" \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=300"

          # Purge from CDN
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://rpm-nginx.centminmod.com/index.html"]}' > /dev/null
          echo "DONE: index.html uploaded and CDN cache purged"

      - name: Verify R2 upload (list objects)
        if: always()
        run: |
          echo "=== Verify R2 objects ==="
          aws s3 ls "s3://${R2_BUCKET}/${REPO_PATH}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --recursive --human-readable --summarize 2>&1 || echo "WARNING: Could not list R2 objects"

      - name: Verify public access
        run: |
          echo "=== Verify public access via custom domain ==="
          PASS=0; FAIL=0

          # Check repomd.xml
          echo "--- repomd.xml ---"
          RESP=$(curl -sI "https://${CUSTOM_DOMAIN}/${REPO_PATH}/repodata/repomd.xml" 2>&1)
          HTTP_CODE=$(echo "$RESP" | grep -i "^HTTP/" | tail -1 | awk '{print $2}')
          CT=$(echo "$RESP" | grep -i "^content-type:" | head -1 | tr -d '\r')
          CC=$(echo "$RESP" | grep -i "^cache-control:" | head -1 | tr -d '\r')
          CF_CACHE=$(echo "$RESP" | grep -i "^cf-cache-status:" | head -1 | tr -d '\r')
          echo "  HTTP: $HTTP_CODE"
          echo "  $CT"
          echo "  $CC"
          echo "  $CF_CACHE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "  PASS: repomd.xml accessible"
            PASS=$((PASS+1))
          else
            echo "  FAIL: repomd.xml returned HTTP $HTTP_CODE"
            FAIL=$((FAIL+1))
          fi

          echo ""

          # Check a sample RPM
          RPM_FILE=$(ls "repo/${REPO_PATH}/"*.rpm 2>/dev/null | head -1 | xargs -r basename)
          if [ -n "$RPM_FILE" ]; then
            echo "--- $RPM_FILE ---"
            RPM_RESP=$(curl -sI "https://${CUSTOM_DOMAIN}/${REPO_PATH}/${RPM_FILE}" 2>&1)
            RPM_HTTP=$(echo "$RPM_RESP" | grep -i "^HTTP/" | tail -1 | awk '{print $2}')
            RPM_CT=$(echo "$RPM_RESP" | grep -i "^content-type:" | head -1 | tr -d '\r')
            RPM_CC=$(echo "$RPM_RESP" | grep -i "^cache-control:" | head -1 | tr -d '\r')
            RPM_CF=$(echo "$RPM_RESP" | grep -i "^cf-cache-status:" | head -1 | tr -d '\r')
            echo "  HTTP: $RPM_HTTP"
            echo "  $RPM_CT"
            echo "  $RPM_CC"
            echo "  $RPM_CF"
            if [ "$RPM_HTTP" = "200" ]; then
              echo "  PASS: RPM accessible"
              PASS=$((PASS+1))
            else
              echo "  FAIL: RPM returned HTTP $RPM_HTTP"
              FAIL=$((FAIL+1))
            fi
          fi

          echo ""
          echo "=== Public access verification: $PASS passed, $FAIL failed ==="
          if [ "$FAIL" -gt 0 ]; then
            echo "ERROR: Public access verification failed"
            exit 1
          fi

      - name: Validate repomd.xml from CDN
        run: |
          echo "=== Validate repomd.xml from CDN ==="
          if ! REPOMD_CONTENT=$(curl -sf "https://${CUSTOM_DOMAIN}/${REPO_PATH}/repodata/repomd.xml"); then
            echo "FAIL: Could not fetch repomd.xml from CDN (curl exit code: $?)"
            exit 1
          fi
          echo "$REPOMD_CONTENT"
          echo ""

          # Verify it contains expected metadata types
          PASS=0; FAIL=0
          for mtype in primary filelists other; do
            if echo "$REPOMD_CONTENT" | grep -q "type=\"$mtype\""; then
              echo "PASS: repomd.xml references $mtype metadata"
              PASS=$((PASS+1))
            else
              echo "FAIL: repomd.xml missing $mtype metadata reference"
              FAIL=$((FAIL+1))
            fi
          done
          echo ""
          echo "=== repomd.xml validation: $PASS passed, $FAIL failed ==="

      - name: Workflow timing summary
        if: always()
        run: |
          WORKFLOW_END=$(date +%s)
          ELAPSED=$((WORKFLOW_END - ${WORKFLOW_START:-$WORKFLOW_END}))
          MINS=$((ELAPSED / 60))
          SECS=$((ELAPSED % 60))
          echo "=========================================="
          echo "=== PUBLISH WORKFLOW SUMMARY           ==="
          echo "=========================================="
          echo "  Variant:     ${VARIANT:-${{ inputs.variant }}}"
          echo "  EL version:  ${EL_VERSION:-${{ inputs.el_version }}}"
          echo "  Source run:   ${{ inputs.run_id }}"
          echo "  R2 path:     ${REPO_PATH:-unknown}"
          echo "  Public URL:  https://${CUSTOM_DOMAIN}/${REPO_PATH:-unknown}/"
          echo "  RPMs staged: $(ls repo/${REPO_PATH:-/dev/null}/*.rpm 2>/dev/null | wc -l || echo 0)"
          echo "  Total time:  ${MINS}m ${SECS}s (${ELAPSED}s)"
          echo "=========================================="

  test-install:
    name: Test dnf install from R2 (EL${{ inputs.el_version }})
    needs: publish
    runs-on: ${{ inputs.variant == 'optimized-v4' && 'ubicloud-standard-16' || 'ubuntu-24.04' }}
    steps:
      - name: Test repo install in Docker
        run: |
          docker run --rm almalinux:${{ inputs.el_version }} bash -c '
            set -e
            VARIANT="${{ inputs.variant }}"
            EL_MAJOR=$(rpm -E %{rhel})

            echo "=========================================="
            echo "=== R2 REPOSITORY INSTALL TEST         ==="
            echo "=========================================="
            echo "  Variant:    ${VARIANT}"
            echo "  EL version: ${EL_MAJOR}"
            echo ""

            echo "=== Configure R2 RPM repository ==="
            cat > /etc/yum.repos.d/centminmod-nginx-test.repo << REPO
          [centminmod-nginx-test]
          name=Centmin Mod Nginx Test - ${VARIANT} - EL${EL_MAJOR}
          baseurl=https://rpm-nginx.centminmod.com/${VARIANT}/el/${EL_MAJOR}/\$basearch/
          enabled=1
          gpgcheck=0
          metadata_expire=60
          skip_if_unavailable=0
          REPO
            cat /etc/yum.repos.d/centminmod-nginx-test.repo
            echo ""

            echo "=== Install system dependencies ==="
            dnf -y install procps-ng brotli libmaxminddb gd libxslt libxml2 libzstd 2>&1 | tail -5
            echo ""

            echo "=== dnf makecache ==="
            dnf makecache --repo=centminmod-nginx-test 2>&1
            echo ""

            echo "=== dnf repoquery: list available packages ==="
            dnf repoquery --repo=centminmod-nginx-test \
              --qf "%{name}-%{version}-%{release}.%{arch}" 2>/dev/null || true
            PKG_COUNT=$(dnf repoquery --repo=centminmod-nginx-test 2>/dev/null | wc -l)
            echo ""
            echo "Total packages in repo: $PKG_COUNT"
            echo ""

            # Determine base package name for this variant
            case "${VARIANT}" in
              awslc|awslc-optimized|awslc-optimized-v4)
                       BASE_PKG="centminmod-nginx-awslc" ;;
              openssl) BASE_PKG="centminmod-nginx-openssl" ;;
              *)       BASE_PKG="centminmod-nginx" ;;
            esac

            echo "=== dnf info ${BASE_PKG} ==="
            dnf info --repo=centminmod-nginx-test "${BASE_PKG}" 2>&1 || {
              echo "FAIL: ${BASE_PKG} not found in repo"
              echo "Available packages:"
              dnf repoquery --repo=centminmod-nginx-test 2>/dev/null || true
              exit 1
            }
            echo ""

            # EL8 modular filtering blocks nginx-related packages; disable the module stream
            dnf module disable -y nginx 2>/dev/null || true

            echo "=== dnf install base + all modules ==="
            dnf install -y --enablerepo=centminmod-nginx-test --allowerasing \
              "${BASE_PKG}" "nginx-module-*" 2>&1
            echo ""

            echo "=== Installed centminmod/nginx RPM packages ==="
            rpm -qa --qf '%{NAME}-%{VERSION}-%{RELEASE}.%{ARCH}\n' | grep -E "centminmod-nginx|nginx-module" | sort
            echo ""

            echo "=== RPM dependencies (auto-resolved by dnf) ==="
            for pkg in $(rpm -qa --qf '%{NAME}\n' | grep -E "centminmod-nginx|nginx-module" | sort); do
              echo "--- $pkg ---"
              rpm -qR "$pkg" | grep -vE "^rpmlib|^config|^/bin/sh" | sort
              echo ""
            done

            echo "=== Verify installation ==="
            PASS=0; FAIL=0

            # Binary exists
            if [ -x /usr/local/sbin/nginx ]; then
              echo "PASS: nginx binary installed at /usr/local/sbin/nginx"
              PASS=$((PASS+1))
            else
              echo "FAIL: nginx binary missing"
              FAIL=$((FAIL+1))
            fi

            # nginx -V
            echo ""
            echo "=== nginx -V ==="
            /usr/local/sbin/nginx -V 2>&1
            PASS=$((PASS+1))

            # Module .so files
            SO_COUNT=$(ls /usr/local/nginx/modules/*.so 2>/dev/null | wc -l)
            echo ""
            echo "Module .so files installed: $SO_COUNT"
            ls /usr/local/nginx/modules/*.so 2>/dev/null | while read f; do
              echo "  $(basename "$f")"
            done
            if [ "$SO_COUNT" -ge 30 ]; then
              echo "PASS: $SO_COUNT module .so files"
              PASS=$((PASS+1))
            else
              echo "WARN: Only $SO_COUNT .so files (expected 30+)"
            fi

            # Config files
            echo ""
            echo "=== Config files ==="
            if [ -f /usr/local/nginx/conf/nginx.conf ]; then
              echo "PASS: nginx.conf exists"
              PASS=$((PASS+1))
            else
              echo "FAIL: nginx.conf missing"
              FAIL=$((FAIL+1))
            fi

            if [ -d /usr/local/nginx/conf/dynamic-modules.d ]; then
              DROPIN_COUNT=$(ls /usr/local/nginx/conf/dynamic-modules.d/*.conf 2>/dev/null | wc -l)
              echo "PASS: dynamic-modules.d/ exists ($DROPIN_COUNT drop-in files)"
              PASS=$((PASS+1))
            else
              echo "WARN: dynamic-modules.d/ not present (requires Phase 7B RPMs)"
            fi

            # nginx -t config test
            echo ""
            echo "=== nginx -t ==="
            if /usr/local/sbin/nginx -t 2>&1; then
              echo "PASS: nginx -t config test"
              PASS=$((PASS+1))
            else
              echo "FAIL: nginx -t failed"
              FAIL=$((FAIL+1))
              echo ""
              echo "=== Debug: nginx -T ==="
              /usr/local/sbin/nginx -T 2>&1 || true
            fi

            # Start, curl, stop
            echo ""
            echo "=== nginx start/curl/stop ==="
            /usr/local/sbin/nginx 2>&1
            sleep 1
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "PASS: curl localhost returned HTTP $HTTP_CODE"
              PASS=$((PASS+1))
            else
              echo "FAIL: curl localhost returned HTTP $HTTP_CODE"
              FAIL=$((FAIL+1))
            fi
            /usr/local/sbin/nginx -s stop 2>&1
            echo "PASS: nginx stopped cleanly"
            PASS=$((PASS+1))

            # RPM package info
            echo ""
            echo "=== rpm -qi ${BASE_PKG} ==="
            rpm -qi "${BASE_PKG}" 2>&1

            echo ""
            echo "=========================================="
            echo "=== INSTALL TEST SUMMARY               ==="
            echo "=========================================="
            echo "  Variant:    ${VARIANT}"
            echo "  EL version: ${EL_MAJOR}"
            echo "  Base pkg:   ${BASE_PKG}"
            echo "  Repo pkgs:  $PKG_COUNT packages"
            echo "  .so files:  $SO_COUNT modules"
            echo "  Passed:     $PASS"
            echo "  Failed:     $FAIL"
            echo "=========================================="
            if [ "$FAIL" -gt 0 ]; then
              echo "ERROR: Install test had $FAIL failures"
              exit 1
            fi
          '
