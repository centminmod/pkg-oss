name: Build Profiling Tools Image
run-name: "Build profiling-tools-el9:llvm-${{ inputs.llvm_version }}"

# Builds BOLT + AutoFDO tools and pushes to GHCR.
# Run this ONCE per LLVM version change. The image is reused by
# build-nginx-rpm-autofdo.yml and build-nginx-rpm-bolt.yml.
#
# After first push, change package visibility to "public" in:
#   GitHub repo Settings > Packages > profiling-tools-el9 > Package settings > Change visibility
#
# Cost: $0 for public repos (storage + pulls are free on GHCR)

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'LLVM version tag (e.g., 19.1.7)'
        required: true
        default: '19.1.7'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/profiling-tools-el9

jobs:
  build-and-push:
    name: Build & push profiling tools
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.profiling-tools-el9
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:llvm-${{ inputs.llvm_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Verify pushed image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:llvm-${{ inputs.llvm_version }}
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:llvm-${{ inputs.llvm_version }} bash -c '
            echo "=== BOLT tools ==="
            llvm-bolt --version
            echo ""
            echo "=== perf2bolt ==="
            perf2bolt --help 2>&1 | head -5
            echo ""
            echo "=== merge-fdata ==="
            merge-fdata --help 2>&1 | head -5
            echo ""
            echo "=== create_gcov ==="
            create_gcov --help 2>&1 | head -5 || true
            echo ""
            echo "=== perf ==="
            perf --version
            echo ""
            echo "=== ab (Apache Bench) ==="
            ab -V 2>&1 | head -2
            echo ""
            echo "PASS: All profiling tools verified"
          '
