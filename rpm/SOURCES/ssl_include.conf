# SSL/TLS Configuration for Centmin Mod Nginx RPM
#
# Security: TLSv1 and TLSv1.1 deprecated per RFC 8996
# Only TLSv1.2 and TLSv1.3 enabled
#
# Note: This is a base configuration included by nginx vhost templates.
# Override these settings in individual vhost configurations as needed.

ssl_session_cache      shared:SSL:10m;
ssl_session_timeout    60m;
ssl_protocols  TLSv1.2 TLSv1.3;
